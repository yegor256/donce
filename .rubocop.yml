---
AllCops:
  Exclude:
    - 'bin/**/*'
    - 'assets/**/*'
    - 'vendor/**/**'
  DisplayCopNames: true
  TargetRubyVersion: 3.2
  SuggestExtensions: false
  NewCops: enable
plugins:
  - rubocop-minitest
  - rubocop-performance
  - rubocop-rake
  - rubocop-elegant

Metrics/ModuleLength:
  Exclude:
    - 'lib/donce.rb'

Metrics/AbcSize:
  Exclude:
    - 'lib/donce.rb'

Metrics/CyclomaticComplexity:
  Exclude:
    - 'lib/donce.rb'

Metrics/PerceivedComplexity:
  Exclude:
    - 'lib/donce.rb'

Elegant/GoodMethodName:
  Exclude:
    - 'lib/donce.rb'
